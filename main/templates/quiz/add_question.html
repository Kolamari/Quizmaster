{% extends 'base.html' %}

{% block title %}Add Question - QuizMaster{% endblock %}

{% block content %}
<section class="py-8 px-4 bg-gray-100 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="mb-8 ">
            <a href="{% url 'manage_questions' %}" class="inline-flex items-center text-sm text-gray-600 hover:text-primary-700 transition-colors mb-4">
                <i class="fas fa-arrow-left mr-2"></i>Back to Questions
            </a>
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-accent-100 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plus text-accent-700"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Add Question</h1>
                    <p class="text-gray-600 text-sm">Create a new multiple-choice question</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl shadow-md p-8 ">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Question Text <span class="text-red-500">*</span></label>
                    <textarea name="text" rows="3" required
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none resize-none"
                        placeholder="Enter the question text here..."></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Difficulty</label>
                        <select name="difficulty" 
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Medium</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Explanation (Optional)</label>
                    <textarea name="explanation" rows="2"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none resize-none"
                        placeholder="Explain why the correct answer is correct..."></textarea>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Answer Options <span class="text-red-500">*</span></label>
                    <p class="text-gray-500 text-xs mb-3">Select the radio button next to the correct answer.</p>
                    
                    <div class="space-y-3">
                        <div class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl">
                            <input type="radio" name="correct_option" value="0" id="correct0" class="w-5 h-5 text-primary-600 focus:ring-primary-500" required>
                            <label for="correct0" class="text-sm font-medium text-gray-700 mr-3">A</label>
                            <input type="text" name="option_text[]" required
                                class="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none"
                                placeholder="Option A text">
                        </div>
                        
                        <div class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl">
                            <input type="radio" name="correct_option" value="1" id="correct1" class="w-5 h-5 text-primary-600 focus:ring-primary-500">
                            <label for="correct1" class="text-sm font-medium text-gray-700 mr-3">B</label>
                            <input type="text" name="option_text[]" required
                                class="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none"
                                placeholder="Option B text">
                        </div>
                        
                        <div class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl">
                            <input type="radio" name="correct_option" value="2" id="correct2" class="w-5 h-5 text-primary-600 focus:ring-primary-500">
                            <label for="correct2" class="text-sm font-medium text-gray-700 mr-3">C</label>
                            <input type="text" name="option_text[]" required
                                class="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none"
                                placeholder="Option C text">
                        </div>
                        
                        <div class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl">
                            <input type="radio" name="correct_option" value="3" id="correct3" class="w-5 h-5 text-primary-600 focus:ring-primary-500">
                            <label for="correct3" class="text-sm font-medium text-gray-700 mr-3">D</label>
                            <input type="text" name="option_text[]" required
                                class="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none"
                                placeholder="Option D text">
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between pt-4">
                    <a href="{% url 'manage_questions' %}" class="px-6 py-3 border border-gray-300 rounded-xl text-gray-700 font-medium hover:bg-gray-50 transition-all">
                        Cancel
                    </a>
                    <button type="submit" class="px-6 py-3 btn-primary text-white rounded-xl font-medium inline-flex items-center">
                        <i class="fas fa-save mr-2"></i>Save Question
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
