{% extends 'base.html' %}

{% block title %}Quiz Settings - QuizMaster{% endblock %}

{% block content %}
<section class="py-8 px-4 bg-gray-100 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="mb-8 ">
            <a href="{% url 'admin_dashboard' %}" class="inline-flex items-center text-sm text-gray-600 hover:text-primary-700 transition-colors mb-4">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center">
                    <i class="fas fa-cog text-purple-700"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Quiz Settings</h1>
                    <p class="text-gray-600 text-sm">Configure quiz parameters and behavior</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl shadow-md p-8 ">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Quiz Title</label>
                    <input type="text" name="title" value="{{ settings.title }}"
                        class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none">
                </div>
                
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Duration (minutes)</label>
                        <input type="number" name="duration_minutes" value="{{ settings.duration_minutes }}" min="1" max="180"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Total Questions</label>
                        <input type="number" name="total_questions" value="{{ settings.total_questions }}" min="1" max="100"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Passing Score</label>
                        <input type="number" name="passing_score" value="{{ settings.passing_score }}" min="1"
                            class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none">
                    </div>
                </div>
                
                <div class="border-t border-gray-200 pt-6">
                    <h3 class="font-semibold text-gray-900 mb-4">Randomization</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition-all">
                            <input type="checkbox" name="shuffle_questions" {% if settings.shuffle_questions %}checked{% endif %}
                                class="w-5 h-5 text-primary-600 rounded focus:ring-primary-500">
                            <div>
                                <p class="font-medium text-gray-900 text-sm">Shuffle Questions</p>
                                <p class="text-xs text-gray-500">Randomize question order</p>
                            </div>
                        </label>
                        <label class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition-all">
                            <input type="checkbox" name="shuffle_options" {% if settings.shuffle_options %}checked{% endif %}
                                class="w-5 h-5 text-primary-600 rounded focus:ring-primary-500">
                            <div>
                                <p class="font-medium text-gray-900 text-sm">Shuffle Options</p>
                                <p class="text-xs text-gray-500">Randomize answer options</p>
                            </div>
                        </label>
                    </div>
                </div>
                
                <div class="border-t border-gray-200 pt-6">
                    <h3 class="font-semibold text-gray-900 mb-4">Results & Attempts</h3>
                    <div class="space-y-4">
                        <label class="flex items-center space-x-3 p-4 bg-gray-50 rounded-xl cursor-pointer hover:bg-gray-100 transition-all">
                            <input type="checkbox" name="allow_multiple_attempts" {% if settings.allow_multiple_attempts %}checked{% endif %}
                                class="w-5 h-5 text-primary-600 rounded focus:ring-primary-500">
                            <div>
                                <p class="font-medium text-gray-900 text-sm">Allow Multiple Attempts</p>
                                <p class="text-xs text-gray-500">Students can retake the quiz</p>
                            </div>
                        </label>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Results Release Time</label>
                            <input type="datetime-local" name="results_release_time" 
                                value="{% if settings.results_release_time %}{{ settings.results_release_time|date:'Y-m-d\\TH:i' }}{% endif %}"
                                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all outline-none">
                            <p class="text-xs text-gray-500 mt-1">Leave empty for immediate release</p>
                        </div>
                    </div>
                </div>
                
                <div class="border-t border-gray-200 pt-6">
                    <label class="flex items-center space-x-3 p-4 {% if settings.is_active %}bg-green-50{% else %}bg-red-50{% endif %} rounded-xl cursor-pointer hover:bg-opacity-80 transition-all">
                        <input type="checkbox" name="is_active" {% if settings.is_active %}checked{% endif %}
                            class="w-5 h-5 text-primary-600 rounded focus:ring-primary-500">
                        <div>
                            <p class="font-medium text-gray-900 text-sm">Quiz Active</p>
                            <p class="text-xs text-gray-500">Students can access and take the quiz</p>
                        </div>
                    </label>
                </div>
                
                <div class="flex items-center justify-between pt-4">
                    <a href="{% url 'admin_dashboard' %}" class="px-6 py-3 border border-gray-300 rounded-xl text-gray-700 font-medium hover:bg-gray-50 transition-all">
                        Cancel
                    </a>
                    <button type="submit" class="px-6 py-3 btn-primary text-white rounded-xl font-medium inline-flex items-center">
                        <i class="fas fa-save mr-2"></i>Save Settings
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
